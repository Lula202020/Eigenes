<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Asetto Launcher{% endblock %}</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <script>
        function persistClosestTrackScroll(node) {
            const track = node ? node.closest(".carousel-track[data-persist-key]") : null;
            if (!track) {
                return;
            }

            const key = track.dataset.persistKey;
            if (!key) {
                return;
            }

            sessionStorage.setItem(`carousel-scroll:${key}`, String(track.scrollLeft));
        }

        function setupPersistedCarouselScroll() {
            document.querySelectorAll(".carousel-track[data-persist-key]").forEach((track) => {
                const key = track.dataset.persistKey;
                if (!key) {
                    return;
                }

                const storageKey = `carousel-scroll:${key}`;
                const savedValue = Number.parseFloat(sessionStorage.getItem(storageKey) || "");

                if (Number.isFinite(savedValue) && savedValue >= 0) {
                    // Apply on next frame so widths are measured and scroll bounds are valid.
                    window.requestAnimationFrame(() => {
                        const maxLeft = Math.max(0, track.scrollWidth - track.clientWidth);
                        track.scrollLeft = Math.min(maxLeft, savedValue);
                    });
                }

                track.addEventListener("scroll", () => {
                    sessionStorage.setItem(storageKey, String(track.scrollLeft));
                }, { passive: true });
            });
        }

        function setupCarouselMouseDrag() {
            const tracks = document.querySelectorAll(".carousel-track");

            tracks.forEach((track) => {
                let isPointerDown = false;
                let activePointerId = null;
                let startX = 0;
                let startScrollLeft = 0;
                let dragDistance = 0;
                let suppressClick = false;

                const hasOverflow = () => track.scrollWidth - track.clientWidth > 2;

                const settleToNearestCard = () => {
                    const cards = Array.from(track.querySelectorAll(".carousel-item"));
                    if (!cards.length || !hasOverflow()) {
                        return;
                    }

                    const currentLeft = track.scrollLeft;
                    const maxLeft = Math.max(0, track.scrollWidth - track.clientWidth);
                    const endThreshold = Math.max(80, Math.floor(track.clientWidth * 0.18));

                    if (maxLeft - currentLeft <= endThreshold) {
                        const reduceMotionNearEnd = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
                        track.scrollTo({
                            left: maxLeft,
                            behavior: reduceMotionNearEnd ? "auto" : "smooth",
                        });
                        return;
                    }

                    const trackRect = track.getBoundingClientRect();
                    let nearestLeft = currentLeft;
                    let nearestDistance = Number.POSITIVE_INFINITY;

                    cards.forEach((card, index) => {
                        const cardRect = card.getBoundingClientRect();
                        const candidateLeft = currentLeft + (cardRect.left - trackRect.left);
                        const distance = Math.abs(candidateLeft - currentLeft);
                        if (distance < nearestDistance) {
                            nearestDistance = distance;
                            nearestLeft = candidateLeft;
                        }

                        if (index === cards.length - 1) {
                            const endDistance = Math.abs(maxLeft - currentLeft);
                            if (endDistance < nearestDistance) {
                                nearestDistance = endDistance;
                                nearestLeft = maxLeft;
                            }
                        }
                    });

                    const targetLeft = Math.min(maxLeft, Math.max(0, nearestLeft));
                    const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

                    track.scrollTo({
                        left: targetLeft,
                        behavior: reduceMotion ? "auto" : "smooth",
                    });
                };

                const endDrag = () => {
                    if (!isPointerDown) {
                        return;
                    }

                    isPointerDown = false;
                    track.classList.remove("dragging");
                    activePointerId = null;

                    // Smoothly settle to the nearest card instead of hard snapping.
                    settleToNearestCard();
                };

                track.addEventListener("pointerdown", (event) => {
                    if (event.pointerType === "mouse" && event.button !== 0) {
                        return;
                    }
                    if (!hasOverflow()) {
                        return;
                    }

                    isPointerDown = true;
                    activePointerId = event.pointerId;
                    startX = event.clientX;
                    startScrollLeft = track.scrollLeft;
                    dragDistance = 0;
                    suppressClick = false;
                    track.classList.add("dragging");
                });

                window.addEventListener("pointermove", (event) => {
                    if (!isPointerDown) {
                        return;
                    }
                    if (event.pointerId !== activePointerId) {
                        return;
                    }

                    const deltaX = event.clientX - startX;
                    dragDistance = Math.max(dragDistance, Math.abs(deltaX));
                    track.scrollLeft = startScrollLeft - deltaX;

                    if (dragDistance > 6) {
                        suppressClick = true;
                        event.preventDefault();
                    }
                });

                window.addEventListener("pointerup", (event) => {
                    if (event.pointerId !== activePointerId) {
                        return;
                    }
                    endDrag();
                });

                window.addEventListener("pointercancel", (event) => {
                    if (event.pointerId !== activePointerId) {
                        return;
                    }
                    endDrag();
                });

                track.addEventListener("dragstart", (event) => {
                    event.preventDefault();
                });

                track.addEventListener(
                    "click",
                    (event) => {
                        if (!suppressClick) {
                            return;
                        }
                        event.preventDefault();
                        event.stopPropagation();
                        suppressClick = false;
                    },
                    true,
                );
            });
        }

        function setupSelectionCards() {
            const interactiveSelector = "a, button, input, textarea, select, label";

            const submitCardSelection = async (card) => {
                const selectUrl = card.dataset.selectUrl;
                if (!selectUrl) {
                    return;
                }

                const selectMode = (card.dataset.selectMode || "").trim().toLowerCase();
                if (selectMode === "async") {
                    const response = await fetch(selectUrl, {
                        method: "POST",
                        headers: {
                            "X-Requested-With": "XMLHttpRequest",
                        },
                    });

                    const payload = await response.json();
                    if (!response.ok || !payload.ok) {
                        return;
                    }

                    const track = card.closest(".carousel-track");
                    if (track) {
                        track.querySelectorAll(".selection-card.selected").forEach((candidate) => {
                            candidate.classList.remove("selected");
                        });
                    }
                    card.classList.add("selected");
                    return;
                }

                persistClosestTrackScroll(card);

                const form = document.createElement("form");
                form.method = "post";
                form.action = selectUrl;
                form.style.display = "none";
                document.body.appendChild(form);
                form.submit();
            };

            document.querySelectorAll(".selection-card[data-select-url]").forEach((card) => {
                card.addEventListener("click", async (event) => {
                    if (event.defaultPrevented) {
                        return;
                    }

                    if (event.target.closest(interactiveSelector)) {
                        return;
                    }

                    await submitCardSelection(card);
                });

                card.addEventListener("keydown", async (event) => {
                    if (event.key !== "Enter" && event.key !== " ") {
                        return;
                    }

                    if (event.target.closest(interactiveSelector)) {
                        return;
                    }

                    event.preventDefault();
                    await submitCardSelection(card);
                });
            });
        }

        async function sendControl(action) {
            const response = await fetch("{{ url_for('api_control') }}", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ action })
            });

            const payload = await response.json();
            const banner = document.getElementById("status-banner");

            if (banner) {
                banner.textContent = payload.ok ? `${payload.label} zur Warteschlange hinzugefügt.` : payload.error || "Befehl fehlgeschlagen.";
                banner.className = payload.ok ? "status" : "status error";
            }

            if (payload.ok) {
                window.setTimeout(() => window.location.reload(), 450);
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            setupPersistedCarouselScroll();
            setupCarouselMouseDrag();
            setupSelectionCards();
        });
    </script>
    {% block head %}{% endblock %}
</head>
<body>
    {% if back_url is defined and back_url %}
    <a class="page-back button-link ghost" href="{{ back_url }}">Zurück</a>
    {% endif %}
    <main class="page">
        {% block body %}{% endblock %}
    </main>
</body>
</html>
